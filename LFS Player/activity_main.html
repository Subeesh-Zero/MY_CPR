<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>activity_main.xml Code Generator</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --error: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --code-bg: #0b1120;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 700px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--primary);
        }

        .btn-generate {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        .btn-generate:hover {
            background-color: var(--primary-hover);
        }

        .output-container {
            display: none;
            margin-top: 30px;
            animation: fadeIn 0.5s ease;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #1e293b;
            padding: 10px 15px;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            border: 1px solid var(--border-color);
            border-bottom: none;
        }

        .output-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .btn-copy {
            background-color: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn-copy:hover {
            background-color: var(--primary);
            color: white;
        }

        pre {
            background-color: var(--code-bg);
            padding: 20px;
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
            border: 1px solid var(--border-color);
            overflow-x: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            line-height: 1.5;
            color: #a5b4fc;
            max-height: 500px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2>activity_main.xml Setup</h2>
            <p>Customize your app layout details below</p>
        </div>

        <div class="input-group">
            <label for="appName">App Name (Toolbar Title)</label>
            <input type="text" id="appName" placeholder="e.g., VIDEO PLAYER" autocomplete="off">
        </div>

        <div class="input-group">
            <label for="developerName">Developer Name (Footer)</label>
            <input type="text" id="developerName" placeholder="e.g., John Doe" autocomplete="off">
        </div>

        <button class="btn-generate" onclick="generateCode()">Generate XML Code</button>

        <div class="output-container" id="outputContainer">
            <div class="output-header">
                <span class="output-title">activity_main.xml</span>
                <button class="btn-copy" id="copyBtn" onclick="copyCode()">Copy Code</button>
            </div>
            <pre><code id="codeOutput"></code></pre>
        </div>
    </div>

    <textarea id="rawCodeTemplate" style="display:none;">

<?xml version="1.0" encoding="utf-8"?>
<RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
    xmlns:app="http://schemas.android.com/apk/res-auto"
    android:layout_width="match_parent"
    android:layout_height="match_parent"
    android:background="#F5F7FA"
    android:fitsSystemWindows="true">

    <!-- Professional Top Toolbar -->
    <com.google.android.material.appbar.AppBarLayout
        android:id="@+id/appBar"
        android:layout_width="match_parent"
        android:layout_height="wrap_content"
        app:elevation="4dp">

        <com.google.android.material.appbar.MaterialToolbar
            android:id="@+id/topAppBar"
            android:layout_width="match_parent"
            android:layout_height="50dp"
            android:minHeight="50dp"
            android:background="#1A73E8"
            app:title="LFS PLAYER"
            app:titleTextColor="#FFFFFF">

            <TextView
                android:id="@+id/menuButton"
                android:layout_width="wrap_content"
                android:layout_height="match_parent"
                android:layout_gravity="end"
                android:gravity="center"
                android:paddingStart="16dp"
                android:paddingEnd="16dp"
                android:text="⋮"
                android:textColor="#FFFFFF"
                android:textSize="28sp"
                android:textStyle="bold"
                android:background="?attr/selectableItemBackgroundBorderless"
                android:clickable="true"
                android:focusable="true"/>
        </com.google.android.material.appbar.MaterialToolbar>
    </com.google.android.material.appbar.AppBarLayout>

    <!-- Crafted with Footer -->
    <TextView
        android:id="@+id/footerText"
        android:layout_width="match_parent"
        android:layout_height="25dp"
        android:background="#1A73E8"
        android:gravity="center"
        android:text="Crafted with by Subeesh"
        android:textColor="#FFFFFF"
        android:textSize="12sp"
        android:textStyle="bold"
        android:layout_alignParentBottom="true"/>

    <!-- Main Content -->
    <FrameLayout
        android:layout_width="match_parent"
        android:layout_height="match_parent"
        android:layout_below="@id/appBar"
        android:layout_above="@id/footerText">

        <!-- 1. TV Connect Page -->
        <LinearLayout
            android:id="@+id/layoutIpInput"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:gravity="center"
            android:orientation="vertical"
            android:padding="32dp">

            <ImageView
                android:layout_width="100dp"
                android:layout_height="100dp"
                android:src="@drawable/ic_wifi_connection"
                app:tint="#1A73E8"
                android:layout_marginBottom="16dp"/>

            <TextView
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="Connect to TV"
                android:textColor="#202124"
                android:textSize="28sp"
                android:textStyle="bold"
                android:layout_marginBottom="4dp"/>

            <TextView
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="Ensure both devices are on same Wi-Fi"
                android:textColor="#80868B"
                android:textSize="12sp"
                android:layout_marginBottom="32dp"/>

            <com.google.android.material.textfield.TextInputLayout
                android:id="@+id/ipInputLayout"
                style="@style/Widget.MaterialComponents.TextInputLayout.OutlinedBox"
                android:layout_width="match_parent"
                android:layout_height="wrap_content"
                android:layout_marginBottom="24dp"
                app:boxCornerRadiusBottomEnd="12dp"
                app:boxCornerRadiusBottomStart="12dp"
                app:boxCornerRadiusTopEnd="12dp"
                app:boxCornerRadiusTopStart="12dp"
                app:boxStrokeWidth="2dp"
                app:boxStrokeColor="#1A73E8"
                app:hintEnabled="false">

                <com.google.android.material.textfield.TextInputEditText
                    android:id="@+id/ipAddressInput"
                    android:layout_width="match_parent"
                    android:layout_height="wrap_content"
                    android:hint="Enter IP 192.168.1.50"
                    android:textColor="#202124"
                    android:textColorHint="#9AA0A6"
                    android:textSize="18sp"
                    android:inputType="numberDecimal|textUri"
                    android:maxLines="1"
                    android:padding="16dp"
                    android:textAlignment="center"/>
            </com.google.android.material.textfield.TextInputLayout>

            <com.google.android.material.button.MaterialButton
                android:id="@+id/btnConnect"
                android:layout_width="match_parent"
                android:layout_height="56dp"
                android:text="CONNECT"
                android:textColor="#FFFFFF"
                android:textSize="16sp"
                android:textStyle="bold"
                app:backgroundTint="#9E9E9E"
                android:enabled="false"
                app:cornerRadius="12dp"/>
        </LinearLayout>

        <!-- 2. Remote / Player Page -->
        <LinearLayout
            android:id="@+id/layoutRemote"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:gravity="center"
            android:orientation="vertical"
            android:padding="24dp"
            android:visibility="gone">

            <ImageView
                android:layout_width="80dp"
                android:layout_height="80dp"
                android:src="@drawable/ic_tv_vector"
                app:tint="#1A73E8"
                android:layout_marginBottom="8dp"/>

            <com.google.android.material.chip.Chip
                android:id="@+id/tvStatus"
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="Connected to TV"
                app:chipIcon="@android:drawable/presence_online"
                app:chipIconTint="#388E3C"
                android:textColor="#388E3C"
                app:chipBackgroundColor="#E8F5E9"
                app:chipStrokeWidth="0dp"
                android:layout_marginBottom="40dp"
                android:clickable="false"/>

            <com.google.android.material.button.MaterialButton
                android:id="@+id/btnSelectFile"
                android:layout_width="240dp"
                android:layout_height="64dp"
                android:text="SELECT MOVIE"
                android:textColor="#1A73E8"
                android:textSize="16sp"
                android:textStyle="bold"
                app:backgroundTint="#E8F0FE"
                app:strokeColor="#1A73E8"
                app:strokeWidth="2dp"
                app:cornerRadius="16dp"
                app:icon="@android:drawable/ic_menu_gallery"
                app:iconTint="#1A73E8"
                android:layout_marginBottom="24dp"/>

            <com.google.android.material.button.MaterialButton
                android:id="@+id/btnPlayVideo"
                android:layout_width="240dp"
                android:layout_height="64dp"
                android:text="PLAY VIDEO"
                android:textColor="#FFFFFF"
                android:textSize="18sp"
                android:textStyle="bold"
                app:backgroundTint="#1A73E8"
                app:cornerRadius="16dp"
                app:icon="@android:drawable/ic_media_play"
                android:visibility="gone"
                android:layout_marginBottom="48dp"/>

            <com.google.android.material.card.MaterialCardView
                android:id="@+id/layoutPlayingState"
                android:layout_width="match_parent"
                android:layout_height="wrap_content"
                android:visibility="gone"
                app:cardCornerRadius="24dp"
                app:cardElevation="8dp"
                app:cardBackgroundColor="#FFFFFF"
                android:layout_marginTop="16dp">

                <LinearLayout
                    android:layout_width="match_parent"
                    android:layout_height="wrap_content"
                    android:orientation="vertical"
                    android:gravity="center"
                    android:padding="24dp">

                    <!-- Logo replacing the Play Button -->
                    <ImageView
                        android:layout_width="60dp"
                        android:layout_height="60dp"
                        android:src="@drawable/ic_tv_ico"
                        android:layout_marginBottom="16dp"/>

                    <TextView
                        android:layout_width="wrap_content"
                        android:layout_height="wrap_content"
                        android:text="Now Playing on TV"
                        android:textSize="16sp"
                        android:textStyle="bold"
                        android:textColor="#202124"
                        android:layout_marginBottom="16dp"/>

                    <ProgressBar
                        android:id="@+id/progressFake"
                        style="?android:attr/progressBarStyleHorizontal"
                        android:layout_width="match_parent"
                        android:layout_height="8dp"
                        android:indeterminate="true"
                        android:indeterminateTint="#1A73E8"
                        android:layout_marginBottom="24dp"/>

                    <com.google.android.material.button.MaterialButton
                        android:id="@+id/btnStopVideo"
                        android:layout_width="wrap_content"
                        android:layout_height="56dp"
                        android:text="STOP"
                        android:textColor="#FFFFFF"
                        android:textStyle="bold"
                        app:backgroundTint="#D32F2F"
                        app:cornerRadius="28dp"
                        app:icon="@android:drawable/ic_media_pause"
                        android:minWidth="160dp"/>
                </LinearLayout>
            </com.google.android.material.card.MaterialCardView>
        </LinearLayout>
    </FrameLayout>
</RelativeLayout>

    </textarea>

    <script>
        function generateCode() {
            let appName = document.getElementById('appName').value.trim();
            let devName = document.getElementById('developerName').value.trim();

            if(!appName || !devName) {
                alert("Please fill in both the App Name and Developer Name!");
                return;
            }

            // Capitalize the App Name to match original "LFS PLAYER" style
            let upperAppName = appName.toUpperCase();

            // Get the raw XML code from the hidden textarea
            let baseXML = document.getElementById('rawCodeTemplate').value;

            // Dynamic Replacement Logic
            let finalCode = baseXML
                .replace(/app:title="LFS PLAYER"/g, 'app:title="' + upperAppName + '"')
                .replace(/Crafted with by Subeesh/g, 'Crafted with by ' + devName);

            document.getElementById('codeOutput').textContent = finalCode.trim();
            document.getElementById('outputContainer').style.display = 'block';
            document.getElementById('copyBtn').textContent = 'Copy Code';
        }

        function copyCode() {
            let code = document.getElementById('codeOutput').textContent;
            navigator.clipboard.writeText(code).then(() => {
                let btn = document.getElementById('copyBtn');
                btn.textContent = 'Copied!';
                btn.style.backgroundColor = '#10b981';
                btn.style.borderColor = '#10b981';
                btn.style.color = 'white';
                
                setTimeout(() => {
                    btn.textContent = 'Copy Code';
                    btn.style.backgroundColor = 'transparent';
                    btn.style.borderColor = 'var(--primary)';
                    btn.style.color = 'var(--primary)';
                }, 2500);
            }).catch(err => {
                console.error('Failed to copy text: ', err);
                alert("Failed to copy code. Please try manually.");
            });
        }
    </script>
</body>
</html>
