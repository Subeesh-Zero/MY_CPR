<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manifest Code Generator</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --error: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --code-bg: #0b1120;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 700px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--primary);
        }

        .input-group input.error-border {
            border-color: var(--error);
        }

        #errorMessage {
            color: var(--error);
            font-size: 13px;
            margin-top: 6px;
            display: none;
        }

        .btn-generate {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        .btn-generate:hover {
            background-color: var(--primary-hover);
        }

        .output-container {
            display: none;
            margin-top: 30px;
            animation: fadeIn 0.5s ease;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #1e293b;
            padding: 10px 15px;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            border: 1px solid var(--border-color);
            border-bottom: none;
        }

        .output-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .btn-copy {
            background-color: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn-copy:hover {
            background-color: var(--primary);
            color: white;
        }

        pre {
            background-color: var(--code-bg);
            padding: 20px;
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
            border: 1px solid var(--border-color);
            overflow-x: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            line-height: 1.5;
            color: #a5b4fc;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2>Manifest Setup</h2>
            <p>Enter your application details below to generate the code</p>
        </div>

        <div class="input-group">
            <label for="appName">App Name</label>
            <input type="text" id="appName" placeholder="e.g., Video Player Pro" autocomplete="off">
        </div>

        <div class="input-group">
            <label for="packageName">Package Name</label>
            <input type="text" id="packageName" placeholder="e.g., com.videoplayer.pro" autocomplete="off">
            <div id="errorMessage">Invalid package name! It must contain at least one dot (e.g., com.myapp), use only lowercase letters/numbers, and start with a letter.</div>
        </div>

        <button class="btn-generate" onclick="generateCode()">Generate Code</button>

        <div class="output-container" id="outputContainer">
            <div class="output-header">
                <span class="output-title">AndroidManifest.xml</span>
                <button class="btn-copy" id="copyBtn" onclick="copyCode()">Copy Code</button>
            </div>
            <pre><code id="codeOutput"></code></pre>
        </div>
    </div>

    <script>
        // Auto-suggest package name based on App Name
        document.getElementById('appName').addEventListener('input', function(e) {
            let name = e.target.value.toLowerCase().trim();
            // Remove special characters and spaces
            let formattedName = name.replace(/[^a-z0-9]/g, '');
            
            let packageInput = document.getElementById('packageName');
            if(formattedName.length > 0) {
                // Ensure it starts with a letter for auto-suggestion
                if(/^[0-9]/.test(formattedName)) {
                    formattedName = 'app' + formattedName;
                }
                packageInput.value = 'com.' + formattedName + '.app';
            } else {
                packageInput.value = '';
            }
            
            // Clear error styling when typing
            clearError();
        });

        // Clear error styling when manually editing package name
        document.getElementById('packageName').addEventListener('input', clearError);

        function clearError() {
            document.getElementById('packageName').classList.remove('error-border');
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('outputContainer').style.display = 'none';
        }

        // Android Studio Package Name Validation Logic
        function isValidPackageName(packageName) {
            // Regex explanation:
            // ^[a-z][a-z0-9_]* : Must start with a letter, followed by letters, numbers, or underscores
            // (\.[a-z][a-z0-9_]*)+$ : Must have at least one dot, followed by the same rules, ending the string
            const packageRegex = /^[a-z][a-z0-9_]*(\.[a-z][a-z0-9_]*)+$/;
            
            // Convert to lowercase for checking, though it's best practice to keep packages lowercase
            return packageRegex.test(packageName.toLowerCase());
        }

        function generateCode() {
            let appName = document.getElementById('appName').value.trim();
            let packageName = document.getElementById('packageName').value.trim();
            let packageInput = document.getElementById('packageName');
            let errorMsg = document.getElementById('errorMessage');

            if(!appName || !packageName) {
                alert("Please fill in both App Name and Package Name!");
                return;
            }

            // Validate the package name format
            if(!isValidPackageName(packageName)) {
                packageInput.classList.add('error-border');
                errorMsg.style.display = 'block';
                document.getElementById('outputContainer').style.display = 'none';
                return; // Stop generation if invalid
            }

            // Ensure lowercase package name
            packageName = packageName.toLowerCase();

            // ---> PASTE YOUR MANIFEST XML CODE BELOW THIS LINE <---
            let baseXML = `
            
<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android"
    package="com.lfs.player">

    <uses-permission android:name="android.permission.INTERNET" />
    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
    <uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />
    <uses-permission android:name="android.permission.WAKE_LOCK" />

    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_DATA_SYNC" />
    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />

    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />
    <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />

    <uses-permission android:name="android.permission.REQUEST_IGNORE_BATTERY_OPTIMIZATIONS" />

    <uses-feature android:name="android.hardware.touchscreen" android:required="false" />
    <uses-feature android:name="android.software.leanback" android:required="false" />

    <application
        android:allowBackup="true"
        android:icon="@mipmap/ic_launcher"
        android:roundIcon="@mipmap/ic_launcher"
        android:banner="@drawable/ic_tv_ico"
        android:label="LFS Player"
        android:supportsRtl="true"
        android:theme="@style/AppTheme"
        android:usesCleartextTraffic="true">

        <activity
            android:name=".SelectDeviceActivity"
            android:exported="true">
            <intent-filter>
                <action android:name="android.intent.action.MAIN" />
                <category android:name="android.intent.category.LAUNCHER" />
                <category android:name="android.intent.category.LEANBACK_LAUNCHER" />
            </intent-filter>
        </activity>

        <activity
            android:name=".MainActivity"
            android:exported="false" />

        <activity
            android:name=".tv.TVBrowserActivity"
            android:exported="false"
            android:theme="@style/AppTheme.NoActionBar" />

        <activity
            android:name=".tv.VideoPlayerActivity"
            android:exported="false"
            android:configChanges="orientation|screenSize|keyboardHidden"
            android:screenOrientation="landscape"
            android:theme="@style/AppTheme.NoActionBar" />


        <service
            android:name=".service.FileServerService"
            android:icon="@drawable/ic_tv_ico"
            android:enabled="true"
            android:exported="false"
            android:foregroundServiceType="dataSync" />

    </application>
</manifest>

            `;
            // ---> PASTE YOUR MANIFEST XML CODE ABOVE THIS LINE <---


            // Logic to replace the package name and app label
            let finalCode = baseXML
                .replace(/package="[^"]+"/g, 'package="' + packageName + '"')
                .replace(/android:label="[^"]+"/g, 'android:label="' + appName + '"');

            // Display the generated code
            document.getElementById('codeOutput').textContent = finalCode.trim();
            document.getElementById('outputContainer').style.display = 'block';
            
            // Reset copy button text if it was changed
            document.getElementById('copyBtn').textContent = 'Copy Code';
        }

        function copyCode() {
            let code = document.getElementById('codeOutput').textContent;
            navigator.clipboard.writeText(code).then(() => {
                let btn = document.getElementById('copyBtn');
                btn.textContent = 'Copied!';
                btn.style.backgroundColor = '#10b981';
                btn.style.borderColor = '#10b981';
                btn.style.color = 'white';
                
                setTimeout(() => {
                    btn.textContent = 'Copy Code';
                    btn.style.backgroundColor = 'transparent';
                    btn.style.borderColor = 'var(--primary)';
                    btn.style.color = 'var(--primary)';
                }, 2500);
            }).catch(err => {
                console.error('Failed to copy text: ', err);
                alert("Failed to copy code. Please try manually.");
            });
        }
    </script>
</body>
</html>
