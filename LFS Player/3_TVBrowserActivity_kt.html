<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVBrowserActivity Code Generator</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --error: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --code-bg: #0b1120;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 700px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--primary);
        }

        .input-group input.error-border {
            border-color: var(--error);
        }

        #errorMessage {
            color: var(--error);
            font-size: 13px;
            margin-top: 6px;
            display: none;
        }

        .btn-generate {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        .btn-generate:hover {
            background-color: var(--primary-hover);
        }

        .output-container {
            display: none;
            margin-top: 30px;
            animation: fadeIn 0.5s ease;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #1e293b;
            padding: 10px 15px;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            border: 1px solid var(--border-color);
            border-bottom: none;
        }

        .output-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .btn-copy {
            background-color: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn-copy:hover {
            background-color: var(--primary);
            color: white;
        }

        pre {
            background-color: var(--code-bg);
            padding: 20px;
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
            border: 1px solid var(--border-color);
            overflow-x: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            line-height: 1.5;
            color: #a5b4fc;
            max-height: 500px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2>TVBrowserActivity Setup</h2>
            <p>Enter your package name to generate the TVBrowserActivity code</p>
        </div>

        <div class="input-group">
            <label for="packageName">Package Name</label>
            <input type="text" id="packageName" placeholder="e.g., com.myapp.player" autocomplete="off">
            <div id="errorMessage">Invalid package name! Format: com.example.app (lowercase, no spaces).</div>
        </div>

        <button class="btn-generate" onclick="generateCode()">Generate Kotlin Code</button>

        <div class="output-container" id="outputContainer">
            <div class="output-header">
                <span class="output-title">TVBrowserActivity.kt</span>
                <button class="btn-copy" id="copyBtn" onclick="copyCode()">Copy Code</button>
            </div>
            <pre><code id="codeOutput"></code></pre>
        </div>
    </div>

    <!-- HIDDEN TEXTAREA FOR KOTLIN CODE -->
    <textarea id="rawCodeTemplate" style="display:none;">

package com.lfs.player.tv

import android.content.Context
import android.content.Intent
import android.graphics.Color
import android.net.ConnectivityManager
import android.net.Network
import android.net.NetworkCapabilities
import android.net.NetworkRequest
import android.os.Build
import android.os.Bundle
import android.util.Log
import android.view.View
import android.widget.ProgressBar
import android.widget.TextView
import android.widget.Toast
import android.window.OnBackInvokedDispatcher
import androidx.activity.OnBackPressedCallback
import androidx.appcompat.app.AlertDialog
import androidx.appcompat.app.AppCompatActivity
import androidx.localbroadcastmanager.content.LocalBroadcastManager
import com.lfs.player.R
import fi.iki.elonen.NanoHTTPD

class TVBrowserActivity : AppCompatActivity() {

    companion object {
        private const val TAG = "TVBrowserActivity"
    }

    private lateinit var tvIpAddress: TextView
    private lateinit var tvStatus: TextView
    private lateinit var radarSpinner: ProgressBar
    private var tvServer: NanoHTTPD? = null

    override fun onCreate(savedInstanceState: Bundle?) {
        super.onCreate(savedInstanceState)
        setContentView(R.layout.activity_tv_browser)

        tvIpAddress = findViewById(R.id.tvIpAddress)
        tvStatus = findViewById(R.id.tvStatus)
        radarSpinner = findViewById(R.id.radarSpinner)

        showLocalIp()

        // வைஃபை ஆன்/ஆஃப் ஆவதை கண்காணிக்கும் புதிய மெத்தட் இங்க கால் ஆகுது
        setupNetworkWatcher()

        startReceiverServer()

        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
            onBackInvokedDispatcher.registerOnBackInvokedCallback(
                OnBackInvokedDispatcher.PRIORITY_DEFAULT
            ) {
                showExitConfirmation()
            }
        } else {
            onBackPressedDispatcher.addCallback(this, object : OnBackPressedCallback(true) {
                override fun handleOnBackPressed() {
                    showExitConfirmation()
                }
            })
        }
    }

    // வைஃபை கனெக்ட் ஆகும்போதும், கட் ஆகும்போதும் ஆட்டோமேட்டிக்கா ஐபியை அப்டேட் செய்யும் லாஜிக்
    private fun setupNetworkWatcher() {
        val connectivityManager = getSystemService(Context.CONNECTIVITY_SERVICE) as ConnectivityManager
        val request = NetworkRequest.Builder()
            .addTransportType(NetworkCapabilities.TRANSPORT_WIFI)
            .build()

        connectivityManager.registerNetworkCallback(request, object : ConnectivityManager.NetworkCallback() {
            override fun onAvailable(network: Network) {
                super.onAvailable(network)
                runOnUiThread {
                    showLocalIp() // வைஃபை கிடைத்ததும் ஐபி-யை அப்டேட் பண்ணும்
                }
            }

            override fun onLost(network: Network) {
                super.onLost(network)
                runOnUiThread {
                    tvIpAddress.text = "TV IP: Not available"
                }
            }
        })
    }

    private fun showLocalIp() {
        val ip = getLocalIpAddress()
        tvIpAddress.text = if (ip.isNotEmpty()) "TV IP: $ip" else "TV IP: Not available"
    }

    private fun getLocalIpAddress(): String {
        var fallbackIp = ""
        try {
            java.net.NetworkInterface.getNetworkInterfaces().toList().forEach { intf ->
                if (!intf.isUp || intf.isLoopback) return@forEach

                intf.inetAddresses.toList().forEach { addr ->
                    if (!addr.isLoopbackAddress && addr is java.net.Inet4Address) {
                        val ip = addr.hostAddress ?: ""
                        if (ip.startsWith("192.168.") || ip.startsWith("172.") || ip.startsWith("10.")) {
                            return ip
                        }
                        if (fallbackIp.isEmpty()) fallbackIp = ip
                    }
                }
            }
        } catch (_: Exception) {}
        return fallbackIp
    }

    private fun startReceiverServer() {
        tvServer = object : NanoHTTPD(8081) {
            override fun serve(session: IHTTPSession): Response {
                val uri = session.uri
                val params = session.parameters
                Log.d(TAG, "Request: $uri")

                return when {
                    uri == "/playVideo" -> {
                        val videoUrl = params["url"]?.get(0) ?: ""
                        val videoName = params["name"]?.get(0) ?: "Unknown"
                        if (videoUrl.isNotEmpty()) {
                            runOnUiThread {
                                radarSpinner.visibility = View.GONE
                                tvStatus.text = "Playing: $videoName"
                                tvStatus.setTextColor(Color.parseColor("#00E5FF"))
                                launchPlayer(videoUrl, videoName)
                            }
                            newFixedLengthResponse(Response.Status.OK, "text/plain", "Playing")
                        } else {
                            newFixedLengthResponse(Response.Status.BAD_REQUEST, "text/plain", "Missing URL")
                        }
                    }
                    uri == "/stopVideo" -> {
                        runOnUiThread {
                            radarSpinner.visibility = View.VISIBLE
                            tvStatus.text = "Video Stopped. Ready to Connect..."
                            tvStatus.setTextColor(Color.parseColor("#A0A0B0"))
                            stopPlayer()
                        }
                        newFixedLengthResponse("OK")
                    }
                    else -> newFixedLengthResponse("TV Receiver Ready")
                }
            }
        }
        try {
            tvServer?.start()
            Log.d(TAG, "TV server started")
        } catch (e: Exception) {
            Log.e(TAG, "Failed to start server", e)
            Toast.makeText(this, "Server start failed", Toast.LENGTH_LONG).show()
        }
    }

    private fun launchPlayer(videoUrl: String, videoName: String) {
        val intent = Intent(this, VideoPlayerActivity::class.java).apply {
            putExtra("VIDEO_URL", videoUrl)
            putExtra("VIDEO_NAME", videoName)
            addFlags(Intent.FLAG_ACTIVITY_NEW_TASK or Intent.FLAG_ACTIVITY_SINGLE_TOP)
        }
        startActivity(intent)
    }

    private fun stopPlayer() {
        LocalBroadcastManager.getInstance(this)
            .sendBroadcast(Intent(VideoPlayerActivity.ACTION_STOP_VIDEO))
    }

    override fun onDestroy() {
        tvServer?.stop()
        super.onDestroy()
    }

    private fun showExitConfirmation() {
        AlertDialog.Builder(this)
            .setTitle("Exit")
            .setMessage("Are you sure you want to exit?")
            .setPositiveButton("Yes") { _, _ -> finish() }
            .setNegativeButton("No", null)
            .show()
    }
}

    </textarea>

    <script>
        document.getElementById('packageName').addEventListener('input', clearError);

        function clearError() {
            document.getElementById('packageName').classList.remove('error-border');
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('outputContainer').style.display = 'none';
        }

        function isValidPackageName(packageName) {
            const packageRegex = /^[a-z][a-z0-9_]*(\.[a-z][a-z0-9_]*)+$/;
            return packageRegex.test(packageName.toLowerCase());
        }

        function generateCode() {
            let packageName = document.getElementById('packageName').value.trim();
            let packageInput = document.getElementById('packageName');
            let errorMsg = document.getElementById('errorMessage');

            if(!packageName) {
                alert("Please fill in the Package Name!");
                return;
            }

            if(!isValidPackageName(packageName)) {
                packageInput.classList.add('error-border');
                errorMsg.style.display = 'block';
                document.getElementById('outputContainer').style.display = 'none';
                return; 
            }

            packageName = packageName.toLowerCase();

            // Get the raw Kotlin code from the hidden textarea
            let baseKotlin = document.getElementById('rawCodeTemplate').value;

            // Dynamic Replacement Logic - Replace Package Name globally
            let finalCode = baseKotlin.replace(/com\.lfs\.player/g, packageName);

            document.getElementById('codeOutput').textContent = finalCode.trim();
            document.getElementById('outputContainer').style.display = 'block';
            document.getElementById('copyBtn').textContent = 'Copy Code';
        }

        function copyCode() {
            let code = document.getElementById('codeOutput').textContent;
            navigator.clipboard.writeText(code).then(() => {
                let btn = document.getElementById('copyBtn');
                btn.textContent = 'Copied!';
                btn.style.backgroundColor = '#10b981';
                btn.style.borderColor = '#10b981';
                btn.style.color = 'white';
                
                setTimeout(() => {
                    btn.textContent = 'Copy Code';
                    btn.style.backgroundColor = 'transparent';
                    btn.style.borderColor = 'var(--primary)';
                    btn.style.color = 'var(--primary)';
                }, 2500);
            }).catch(err => {
                console.error('Failed to copy text: ', err);
                alert("Failed to copy code. Please try manually.");
            });
        }
    </script>
</body>
</html>
